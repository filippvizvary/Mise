[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
markers =
    e2e: End-to-end tests that run the full CLI
    smoke: Quick smoke tests for basic functionality
    auth: Authentication-related tests
    profile: User profile and preference tests
    plan: Meal planning tests
    db: Database and discount tests
    scraper: Scraper-related tests
    ai: AI provider tests
    multiuser: Multi-user isolation tests
    edge: Edge case and boundary tests
    journey: Full user journey tests